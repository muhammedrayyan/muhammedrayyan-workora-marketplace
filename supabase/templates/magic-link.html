<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f5f6ef;color:#17201c;font-family:Arial,Helvetica,sans-serif;padding:32px">
    <div style="max-width:520px;margin:0 auto;background:#ffffff;border:1px solid #dfe2da;border-radius:18px;padding:32px">
      <p style="margin:0 0 24px;font-size:22px;font-weight:800">Workora</p>
      <h1 style="margin:0 0 12px;font-size:28px;line-height:1.15">Verify your email address</h1>
      <p style="margin:0 0 22px;color:#69736e;line-height:1.6">Enter this one-time code in Workora to finish signing in:</p>
      <p style="margin:0 0 22px;background:#17201c;color:#c9ff4a;border-radius:12px;padding:18px;text-align:center;font-size:32px;font-weight:800;letter-spacing:8px">{{ .Token }}</p>
      <p style="margin:0;color:#69736e;font-size:12px;line-height:1.6">This code expires shortly and can only be used once. If you did not request it, you can safely ignore this email.</p>
    </div>
  </body>
</html>
